<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>눈대중 MeatSnap – 고기 무게 판정</title>
  <meta name="description" content="사진 한 장으로 고기 양을 판정해드립니다. 눈대중 MeatSnap과 함께 현명한 고기 주문!" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#FF6B35" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="눈대중" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface2: #2e2e2e;
      --border: #3a3a3a;
      --orange: #FF6B35;
      --orange-dark: #e0521c;
      --orange-glow: rgba(255, 107, 53, 0.35);
      --text: #f0f0f0;
      --text-muted: #888;
      --red: #ff4d4f;
      --red-bg: rgba(255, 77, 79, 0.12);
      --yellow: #facc15;
      --yellow-bg: rgba(250, 204, 21, 0.12);
      --green: #4ade80;
      --green-bg: rgba(74, 222, 128, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body { height: 100%; background: #111; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0 0 40px;
      margin: 0;
    }

    #root {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      padding: 28px 20px 18px;
      background: linear-gradient(180deg, #1f1f1f 0%, var(--bg) 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo-icon {
      font-size: 28px;
      line-height: 1;
      filter: drop-shadow(0 0 8px var(--orange));
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .logo-text span:first-child {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--orange);
      text-transform: uppercase;
    }
    .logo-text span:last-child {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo-text strong { color: var(--orange); }

    .header-badge {
      margin-left: auto;
      background: var(--orange-glow);
      border: 1px solid var(--orange);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.05em;
    }

    /* ===== SCROLL BODY ===== */
    .scroll-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ===== SECTION CARD ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--orange) 0%, transparent 100%);
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ===== UPLOAD ZONE ===== */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      background: var(--surface2);
      overflow: hidden;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--orange);
      background: rgba(255, 107, 53, 0.05);
      box-shadow: inset 0 0 0 1px var(--orange-glow);
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .camera-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 20px var(--orange-glow);
      margin-bottom: 4px;
      animation: pulse-icon 2.5s ease-in-out infinite;
    }
    @keyframes pulse-icon {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 20px var(--orange-glow); }
      50% { transform: scale(1.05); box-shadow: 0 4px 30px rgba(255,107,53,0.55); }
    }
    .upload-main-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .upload-sub-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ===== PREVIEW IMAGE ===== */
    .preview-wrapper {
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      min-height: 200px;
    }
    .preview-img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      display: block;
      border-radius: var(--radius-sm);
    }
    .preview-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
      display: flex;
      align-items: flex-end;
      padding: 12px;
    }
    .change-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      position: relative;
    }
    .change-btn input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .change-btn:hover { background: rgba(255,255,255,0.22); }

    /* ===== BUTTON GROUPS ===== */
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-group.cols-2 .choice-btn  { flex: 1; }
    .btn-group.cols-3 .choice-btn  { flex: 1; }
    .btn-group.cols-4 .choice-btn  { flex: 1; }
    .btn-group.cols-5 .choice-btn  { flex: 1 1 calc(20% - 7px); }
    .btn-group.cols-6 .choice-btn  { flex: 1 1 calc(33.333% - 6px); }

    .choice-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 8px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .choice-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, var(--orange-glow), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .choice-btn:hover {
      border-color: var(--orange);
      color: var(--text);
    }
    .choice-btn.active {
      border-color: var(--orange);
      background: rgba(255, 107, 53, 0.15);
      color: var(--orange);
      box-shadow: 0 0 0 1px var(--orange), 0 4px 16px var(--orange-glow);
    }
    .choice-btn.active::after { opacity: 1; }
    .btn-emoji { font-size: 18px; display: block; margin-bottom: 3px; }
    .btn-label { display: block; line-height: 1.2; }
    .btn-sub { display: block; font-size: 10px; font-weight: 400; color: inherit; opacity: 0.65; margin-top: 2px; }

    /* ===== WEIGHT SLIDER ===== */
    .weight-slider-wrap {
      margin-top: 14px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }
    .weight-slider-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .weight-slider-label { font-size: 12px; color: var(--text-muted); }
    .weight-slider-value {
      font-size: 16px;
      font-weight: 900;
      color: var(--orange);
      letter-spacing: -0.5px;
    }
    .weight-slider-value.active { text-shadow: 0 0 12px var(--orange-glow); }
    input[type=range].weight-range {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 99px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range].weight-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 8px var(--orange-glow);
      cursor: pointer;
    }
    .weight-slider-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
    }
    .weight-slider-ticks span { font-size: 10px; color: var(--text-muted); opacity: 0.6; }

    /* ===== SPECIES BUTTONS (1단계) ===== */
    .species-btn {
      flex: 1;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 8px;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.22s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .species-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, var(--orange-glow), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .species-btn:hover { border-color: var(--orange); color: var(--text); }
    .species-btn.active {
      border-color: var(--orange);
      background: rgba(255, 107, 53, 0.15);
      color: var(--orange);
      box-shadow: 0 0 0 1px var(--orange), 0 4px 20px var(--orange-glow);
    }
    .species-btn.active::after { opacity: 1; }
    .species-emoji { font-size: 28px; display: block; margin-bottom: 5px; }
    .species-name  { display: block; font-size: 14px; font-weight: 800; line-height: 1.2; }
    .species-en    { display: block; font-size: 10px; font-weight: 500; opacity: 0.55; margin-top: 3px; }

    /* ===== CUT STEP 2 (슬라이드) ===== */
    .cut-step2 {
      overflow: hidden;
      animation: slide-down-in 0.32s cubic-bezier(0.34, 1.3, 0.64, 1) both;
      transform-origin: top;
    }
    @keyframes slide-down-in {
      from { opacity: 0; transform: scaleY(0.85) translateY(-10px); }
      to   { opacity: 1; transform: scaleY(1)   translateY(0); }
    }
    .step-divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }
    .step2-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .step2-label::before {
      content: '2';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px; height: 16px;
      background: var(--orange);
      color: #fff;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 900;
    }

    /* ===== CTA BUTTON ===== */
    .cta-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      font-family: 'Noto Sans KR', sans-serif;
      letter-spacing: -0.3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
      box-shadow: 0 6px 24px var(--orange-glow);
    }
    .cta-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    .cta-btn:hover::before { left: 150%; }
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(255,107,53,0.5);
    }
    .cta-btn:active { transform: translateY(0); }
    .cta-btn:disabled {
      background: var(--surface2);
      color: var(--text-muted);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    .cta-btn:disabled::before { display: none; }
    .cta-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ===== LOADING SPINNER ===== */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 모달 오버레이 ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fade-in 0.25s ease;
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ===== RESULT CARD (모달 내부) ===== */
    .result-card {
      width: 100%;
      max-width: 100%;
      border-radius: 24px 24px 0 0;
      padding: 28px 20px 48px;
      animation: slide-up 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative;
      overflow: hidden;
      border: 1.5px solid;
      border-bottom: none;
      max-height: 88vh;
      overflow-y: auto;
      box-sizing: border-box;
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(100%); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 색상별 배경 — 더 진하고 선명하게 */
    .result-card.red    { background: linear-gradient(160deg, #2a0a0a 0%, #1a1a1a 100%); border-color: var(--red); }
    .result-card.yellow { background: linear-gradient(160deg, #2a1f00 0%, #1a1a1a 100%); border-color: var(--yellow); }
    .result-card.green  { background: linear-gradient(160deg, #0a2a10 0%, #1a1a1a 100%); border-color: var(--green); }

    /* 모달 핸들 바 */
    .modal-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px;
      margin: 0 auto 20px;
    }

    .result-glow {
      position: absolute;
      top: -40px; right: -40px;
      width: 220px; height: 220px;
      border-radius: 50%;
      filter: blur(50px);
      opacity: 0.4;
    }
    .result-card.red    .result-glow { background: var(--red); }
    .result-card.yellow .result-glow { background: var(--yellow); }
    .result-card.green  .result-glow { background: var(--green); }

    .result-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .result-emoji {
      font-size: 52px;
      line-height: 1;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
      animation: bounce-in 0.5s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes bounce-in {
      from { opacity: 0; transform: scale(0); }
      to   { opacity: 1; transform: scale(1); }
    }
    .result-title-wrap {}
    .result-verdict {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 2px;
    }
    .result-card.red    .result-verdict { color: var(--red); }
    .result-card.yellow .result-verdict { color: var(--yellow); }
    .result-card.green  .result-verdict { color: var(--green); }

    .result-main {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
      text-shadow: 0 0 20px currentColor;
    }
    .result-card.red    .result-main { color: var(--red); }
    .result-card.yellow .result-main { color: var(--yellow); }
    .result-card.green  .result-main { color: var(--green); }

    .result-divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }
    .result-meta {
      display: flex;
      gap: 12px;
    }
    .meta-chip {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
    }
    .meta-chip-label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .meta-chip-value {
      font-size: 15px;
      font-weight: 800;
      color: #fff;
    }

    .result-desc {
      margin-top: 14px;
      font-size: 14px;
      color: #ccc;
      line-height: 1.7;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px;
    }
    .result-desc strong { color: #fff; }

    .confidence-bar-wrap {
      margin-top: 14px;
    }
    .confidence-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .confidence-bar-bg {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .confidence-bar-fill {
      height: 100%;
      border-radius: 99px;
      animation: grow-bar 0.8s 0.3s ease both;
    }
    @keyframes grow-bar {
      from { width: 0; }
    }
    .result-card.red    .confidence-bar-fill { background: var(--red); }
    .result-card.yellow .confidence-bar-fill { background: var(--yellow); }
    .result-card.green  .confidence-bar-fill { background: var(--green); }

    .disclaimer {
      margin-top: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
      text-align: center;
    }
    .disclaimer strong { color: var(--orange); }

    .alert-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 12px 22px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      z-index: 999;
      animation: toast-in 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

        .retry-btn {
      margin-top: 14px;
      width: 100%;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .retry-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
    }

    /* ===== FOOTER ===== */
    .app-footer {
      text-align: center;
      padding: 8px 20px 20px;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.5;
    }


    /* ===== 반응형 ===== */
    @media (max-width: 390px) {
      .scroll-body { padding: 14px 12px; gap: 12px; }
      .card { padding: 14px; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

/* ── 판정 데이터 ── */
const SPECIES = [
  { key: 'pork', emoji: '🐷', name: '돼지고기', en: 'Pork' },
  { key: 'beef', emoji: '🐄', name: '소고기',   en: 'Beef' },
];

const CUTS = {
  pork: [
    { key: '삼겹살', emoji: '🥓', en: 'Pork Belly' },
    { key: '목살',   emoji: '🍖', en: 'Pork Neck' },
    { key: '항정살', emoji: '🍗', en: 'Jowl' },
    { key: '돼지갈비', emoji: '🍗', en: 'Spare Ribs' },
    { key: '막창',   emoji: '🌭', en: 'Makchang' },
  ],
  beef: [
    { key: '등심',   emoji: '🥩', en: 'Sirloin' },
    { key: '갈비살', emoji: '🍖', en: 'Short Rib' },
    { key: '안창살', emoji: '🥓', en: 'Inside Skirt' },
    { key: '부채살', emoji: '🥩', en: 'Flat Iron' },
    { key: '차돌박이', emoji: '✨', en: 'Chadolbaegi' },
    { key: '불고기', emoji: '🔥', en: 'Bulgogi' },
  ],
};

// 결과 카드 부위 표시용 헬퍼
const getCutEmoji = (species, cut) => {
  if (!species || !cut) return '🍖';
  const list = CUTS[species] || [];
  return (list.find(c => c.key === cut) || {}).emoji || '🍖';
};

const VERDICTS = [
  {
    key: 'red',
    emoji: '🔴',
    label: '적음',
    verdict: '양이 부족해요',
    desc: (cut, weight) =>
      `${cut} ${weight}g 기준으로 보면 사진 속 고기가 <strong>예상보다 적어 보입니다.</strong> 혹시 사장님이 조금 짜게 주신 것 같네요. 추가 주문을 고려해보세요!`,
    confidence: () => Math.floor(Math.random() * 20) + 68,
  },
  {
    key: 'yellow',
    emoji: '🟡',
    label: '보통',
    verdict: '적당한 양이에요',
    desc: (cut, weight) =>
      `${cut} ${weight}g 기준으로 <strong>딱 맞는 양</strong>으로 판단됩니다. 정직한 포션이네요! 맛있게 드세요 🔥`,
    confidence: () => Math.floor(Math.random() * 15) + 72,
  },
  {
    key: 'green',
    emoji: '🟢',
    label: '많음',
    verdict: '양이 넉넉해요',
    desc: (cut, weight) =>
      `${cut} ${weight}g 기준보다 <strong>고기가 넉넉하게 담겨있어요!</strong> 오늘 운이 좋으신 날입니다. 사장님 최고 👍`,
    confidence: () => Math.floor(Math.random() * 15) + 80,
  },
];

/* ── 앱 컴포넌트 ── */
function App() {
  const [image, setImage]       = useState(null);
  const [imageFile, setImageFile] = useState(null);
  const [species, setSpecies]   = useState(null);  // 'pork' | 'beef'
  const [cut, setCut]           = useState(null);  // 부위 key
  const [weight, setWeight]     = useState(null);
  const [sliderWeight, setSliderWeight] = useState(200);
  const [loading, setLoading]   = useState(false);
  const [result, setResult]     = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const [toast, setToast] = useState(null);
  const [activeTab, setActiveTab] = useState('judge');
  const [showConsent, setShowConsent] = useState(() => {
    return !localStorage.getItem('meatsnap_consent');
  });
  const [showGuide, setShowGuide] = useState(false);
  const [rankings, setRankings] = useState([]);
  const [rankLoading, setRankLoading] = useState(false);
  const [restaurantName, setRestaurantName] = useState('');
  const [restaurantAddress, setRestaurantAddress] = useState('');
  const [reported, setReported] = useState(false);
  const [reporting, setReporting] = useState(false);
  const [showQR, setShowQR] = useState(false);


  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  };

  
  const compressImage = (file) => new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
        else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob((blob) => {
          const compressed = new File([blob], file.name, { type: 'image/jpeg' });
          resolve(compressed);
        }, 'image/jpeg', 0.82);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

    const handleFile = useCallback(async (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const compressed = await compressImage(file);
    const url = URL.createObjectURL(compressed);
    setImage(url);
    setImageFile(compressed);
    setResult(null);
  }, []);

  const onFileChange = (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); };

  const onDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  };

  const onDragOver = (e) => { e.preventDefault(); setDragOver(true); };
  const onDragLeave = () => setDragOver(false);

  const selectSpecies = (key) => {
    if (key !== species) {
      setSpecies(key);
      setCut(null); // 고기종류 바꾸면 부위 초기화
    }
  };

  const canJudge = !loading;

  const imageFileRef = useRef(null);

  const generateQR = React.useCallback(() => {
    setShowQR(true);
    setTimeout(() => {
      const canvas = document.getElementById('qr-canvas');
      if (!canvas) return;
      // QRCode 라이브러리 로드 확인
      if (typeof QRCode === 'undefined') {
        // 직접 스크립트 로드 시도
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
        script.onload = () => {
          new QRCode(canvas, {
            text: 'https://profound-hotteok-dc6ca2.netlify.app',
            width: 160,
            height: 160,
            colorDark: '#333333',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
          });
        };
        document.head.appendChild(script);
        return;
      }
      new QRCode(canvas, {
        text: 'https://profound-hotteok-dc6ca2.netlify.app',
        width: 160,
        height: 160,
        colorDark: '#333333',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }, 400);
  }, []);

  const saveQR = () => {
    // canvas 또는 img 태그 찾기 (QRCode.js는 img 또는 canvas 생성)
    const qrWrap = document.getElementById('qr-canvas');
    if (!qrWrap) return;
    const img = qrWrap.querySelector('img') || qrWrap.querySelector('canvas');
    if (!img) { showToast('❌ QR코드를 먼저 생성해주세요'); return; }

    // 스티커 전체를 canvas로 합성해서 저장
    const sticker = document.getElementById('qr-sticker-area');
    const fullCanvas = document.createElement('canvas');
    fullCanvas.width = 320;
    fullCanvas.height = 380;
    const ctx = fullCanvas.getContext('2d');

    // 흰 배경
    ctx.fillStyle = '#ffffff';
    ctx.roundRect(0, 0, 320, 380, 20);
    ctx.fill();

    // 테두리
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = 4;
    ctx.roundRect(2, 2, 316, 376, 18);
    ctx.stroke();

    // 제목
    ctx.fillStyle = '#333333';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🥩 눈대중 MeatSnap', 160, 46);

    // QR 코드 이미지 그리기
    const qrImg = new Image();
    const srcCanvas = qrWrap.querySelector('canvas');
    const srcImg = qrWrap.querySelector('img');
    const qrSrc = srcCanvas ? srcCanvas.toDataURL() : (srcImg ? srcImg.src : null);

    if (!qrSrc) { showToast('❌ QR코드 생성 중입니다. 잠시 후 다시 시도해주세요'); return; }

    qrImg.onload = () => {
      ctx.drawImage(qrImg, 80, 64, 160, 160);

      // 구분선
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = '#dddddd';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(24, 244);
      ctx.lineTo(296, 244);
      ctx.stroke();
      ctx.setLineDash([]);

      // 경고 문구
      ctx.fillStyle = '#FF6B35';
      ctx.font = 'bold 15px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⚠️ 이 식당은 MeatSnap', 160, 276);
      ctx.fillText('사용자 평가 중입니다', 160, 298);

      ctx.fillStyle = '#999999';
      ctx.font = '12px sans-serif';
      ctx.fillText('QR 스캔으로 고기 무게 확인하세요', 160, 324);

      ctx.fillStyle = '#cccccc';
      ctx.font = '10px sans-serif';
      ctx.fillText('눈대중 MeatSnap · AI 고기 무게 판정', 160, 358);

      // 다운로드
      const link = document.createElement('a');
      link.download = 'meatsnap_sticker.png';
      link.href = fullCanvas.toDataURL('image/png');
      link.click();
      showToast('✅ 스티커가 저장됐어요!');
    };
    qrImg.src = qrSrc;
  };

  

  const handleConsent = () => {
    localStorage.setItem('meatsnap_consent', '1');
    setShowConsent(false);
  };

  const handleCameraClick = () => {
    setShowGuide(true);
  };

  const handleGuideConfirm = () => {
    setShowGuide(false);
    document.getElementById('fileInput').click();
  };

  

  const fetchRankings = async () => {
    setRankLoading(true);
    try {
      const res = await fetch('/api/rankings');
      const data = await res.json();

      if (!res.ok) throw new Error('기록 실패');

  const judge = async () => {
    if (loading) return;

    if (!species) { showToast('🐷 고기종류을 먼저 선택해주세요!'); return; }

    setResult(null);

    try {
      // 이미지를 base64로 변환 (FileReader 직접 방식)
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(imageFile);

      const speciesName = species === 'pork' ? '돼지고기' : '소고기';
      const weightNum = weight.replace('g', '');

      const prompt = `당신은 고기 무게 판정 전문가입니다.
이 사진은 고깃집에서 주문한 ${speciesName} ${cut} ${weightNum}g 입니다.

다음 기준으로 판정해주세요:
- 접시 대비 고기가 차지하는 비율
- 고기의 두께와 층수
- 전반적인 양감

반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요:
{
  "verdict": "red" 또는 "yellow" 또는 "green",
  "confidence": 숫자(60~95 사이),
  "comment": "한국어로 2문장 이내 판정 코멘트"
}

- red: 주문량보다 적음
- yellow: 주문량과 비슷한 수준
- green: 주문량보다 넉넉함`;

      const mimeType = imageFile?.type === 'image/png' ? 'image/png' : imageFile?.type === 'image/webp' ? 'image/webp' : 'image/jpeg';

      const response = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          imageBase64: base64,
          mimeType: mimeType,
          species: species === 'pork' ? '돼지고기' : '소고기',
          cut: cut,
          weight: weight.replace('g', '')
        })
      });

      if (!response.ok) {
        const errData = await response.json();
        throw new Error('판정 서버 오류: ' + (errData.error || response.status));
      }

      const data = await response.json();
      if (!data.success) throw new Error('판정 실패');
      const parsed = data.result;
      const text = JSON.stringify(parsed);

      // 서버에서 이미 파싱된 결과 사용

      const verdictMap = {
        red:    { key: 'red',    emoji: '🔴', label: '적음', verdict: '양이 부족해요' },
        yellow: { key: 'yellow', emoji: '🟡', label: '보통', verdict: '적당한 양이에요' },
        green:  { key: 'green',  emoji: '🟢', label: '많음', verdict: '양이 넉넉해요' },
      };

      const v = verdictMap[parsed.verdict] || verdictMap['yellow'];
      setResult({
        ...v,
        confidence: parsed.confidence || 75,
        aiComment: parsed.comment || '',
      });

    } catch (err) {
      console.error(err);
      showToast('❌ 판정 중 오류가 발생했어요. 다시 시도해주세요.');
    } finally {
      setLoading(false);
    }
  };

  const reset = () => {

    setImage(null);
    setImageFile(null);
    setSpecies(null);

            <div className="qr-sticker" id="qr-sticker-area">
              <div className="qr-sticker-header">
                <span className="qr-sticker-logo">🥩</span>
                <span className="qr-sticker-title">눈대중 MeatSnap</span>
              </div>
              <div className="qr-canvas-wrap">
                <div id="qr-canvas" style={{width:"160px",height:"160px",margin:"0 auto"}}></div>
              </div>
              <div className="qr-sticker-message">
                ⚠️ 이 식당은 MeatSnap<br/>사용자 평가 중입니다
              </div>
              <div className="qr-sticker-sub">
                QR 스캔으로 고기 무게 확인하세요
              </div>
            </div>

            <div className="qr-btn-wrap">
              <button className="qr-save-btn" onClick={saveQR}>
                💾 스티커 저장하기
              </button>
              <button className="qr-close-btn" onClick={() => setShowQR(false)}>
                닫기
              </button>
            </div>
          </div>
        </div>
      )}

            {toast && <div className="alert-toast">{toast}</div>}
      <footer className="app-footer">눈대중 MeatSnap · AI 고기 무게 판정 · v1.0</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('SW 등록 완료'))
      .catch(e => console.log('SW 등록 실패:', e));
  });
}
</script>
</body>
</html>
